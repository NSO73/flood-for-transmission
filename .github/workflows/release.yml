name: 'Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: 'Release'
    runs-on: 'ubuntu-latest'

    steps:
      - name: Set tag var
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_ENV
      # Checks out a copy of your repository on the ubuntu-latest machine
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache node modules
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - name: Install modules
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy public
        run: cp -r public flood-for-transmission

      - name: Zip release
        run: zip -r flood-for-transmission.zip flood-for-transmission

      - name: Tar release
        run: tar -czvf flood-for-transmission.tar.gz flood-for-transmission

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: '${{ env.tag_name }}'
          prerelease: false
          files: |
            flood-for-transmission.zip
            flood-for-transmission.tar.gz
